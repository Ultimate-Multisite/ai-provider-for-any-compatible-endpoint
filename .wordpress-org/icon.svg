<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Glow halo behind center node -->
  <circle cx="128" cy="128" r="48" fill="#7c3aed" opacity="0.15"/>

  <!-- Connection lines to outer nodes -->
  <line x1="128" y1="128" x2="60"  y2="60"  stroke="#7c3aed" stroke-width="2.5" opacity="0.6"/>
  <line x1="128" y1="128" x2="196" y2="60"  stroke="#2563eb" stroke-width="2.5" opacity="0.6"/>
  <line x1="128" y1="128" x2="196" y2="196" stroke="#7c3aed" stroke-width="2.5" opacity="0.6"/>
  <line x1="128" y1="128" x2="60"  y2="196" stroke="#2563eb" stroke-width="2.5" opacity="0.6"/>
  <line x1="128" y1="128" x2="128" y2="44"  stroke="#a78bfa" stroke-width="2.5" opacity="0.6"/>
  <line x1="128" y1="128" x2="212" y2="128" stroke="#60a5fa" stroke-width="2.5" opacity="0.6"/>
  <line x1="128" y1="128" x2="128" y2="212" stroke="#a78bfa" stroke-width="2.5" opacity="0.6"/>
  <line x1="128" y1="128" x2="44"  y2="128" stroke="#60a5fa" stroke-width="2.5" opacity="0.6"/>

  <!-- Outer nodes -->
  <circle cx="60"  cy="60"  r="10" fill="#7c3aed" opacity="0.9"/>
  <circle cx="196" cy="60"  r="10" fill="#2563eb" opacity="0.9"/>
  <circle cx="196" cy="196" r="10" fill="#7c3aed" opacity="0.9"/>
  <circle cx="60"  cy="196" r="10" fill="#2563eb" opacity="0.9"/>
  <circle cx="128" cy="44"  r="8"  fill="#a78bfa" opacity="0.9"/>
  <circle cx="212" cy="128" r="8"  fill="#60a5fa" opacity="0.9"/>
  <circle cx="128" cy="212" r="8"  fill="#a78bfa" opacity="0.9"/>
  <circle cx="44"  cy="128" r="8"  fill="#60a5fa" opacity="0.9"/>

  <!-- Center node -->
  <circle cx="128" cy="128" r="28" fill="url(#glow)" opacity="0.95"/>
  <circle cx="128" cy="128" r="22" fill="#1a1a2e"/>

  <!-- AI spark / lightning bolt in center -->
  <path d="M132 110 L120 130 L128 130 L124 148 L138 126 L130 126 Z"
        fill="#a78bfa" opacity="0.95"/>
</svg>
